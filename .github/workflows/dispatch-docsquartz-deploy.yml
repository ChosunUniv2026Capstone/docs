name: Dispatch DocsQuartz deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate cross-repo dispatch token
        env:
          DISPATCH_TOKEN: ${{ secrets.DOCSQUARTZ_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "Missing required secret: DOCSQUARTZ_DISPATCH_TOKEN" >&2
            echo "Create a token that can dispatch workflows to ChosunUniv2026Capstone/DocsQuartz." >&2
            exit 1
          fi

      - name: Trigger DocsQuartz production deploy
        env:
          API_URL: ${{ github.api_url }}
          DISPATCH_TOKEN: ${{ secrets.DOCSQUARTZ_DISPATCH_TOKEN }}
        run: |
          payload=$(cat <<JSON
          {
            "event_type": "docs-updated",
            "client_payload": {
              "source_repository": "${{ github.repository }}",
              "source_branch": "${{ github.ref_name }}",
              "source_sha": "${{ github.sha }}",
              "source_compare": "${{ github.event.compare }}",
              "source_commit_url": "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}",
              "requested_by": "${{ github.actor }}"
            }
          }
          JSON
          )

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API_URL}/repos/ChosunUniv2026Capstone/DocsQuartz/dispatches" \
            -d "${payload}"

      - name: Write workflow summary
        run: |
          {
            echo "## DocsQuartz deploy dispatched"
            echo
            echo "- Source repository: \`${{ github.repository }}\`"
            echo "- Source branch: \`${{ github.ref_name }}\`"
            echo "- Source SHA: \`${{ github.sha }}\`"
            echo "- Target repository: \`ChosunUniv2026Capstone/DocsQuartz\`"
            echo "- Event type: \`docs-updated\`"
          } >> "$GITHUB_STEP_SUMMARY"
